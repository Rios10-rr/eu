<!DOCTYPE html>

<html lang="pt-BR">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Rios ❤️ Eduarda</title>

<style>
*{margin:0;padding:0;box-sizing:border-box;}

body{
    width:100%;
    height:100vh;
    font-family:'Segoe UI',sans-serif;
    overflow:hidden;
    background:#000;
}

/* FUNDO */
.background{
    position:fixed;
    width:100%;
    height:100%;
    top:0;
    left:0;
    background-size:contain;
    background-repeat:no-repeat;
    background-position:center;
    z-index:-2;
    transition:background-image 0.8s ease-in-out;
}

/* ESCURECER */
.overlay{
    position:fixed;
    width:100%;
    height:100%;
    background:rgba(0,0,0,0.4);
    top:0;
    left:0;
    z-index:-1;
}

/* TÍTULO */
.container{
    position:absolute;
    top:40%;
    width:100%;
    text-align:center;
    color:#fff;
}

h1{
    font-size:3em;
    animation:bounce 2s infinite;
}

@keyframes bounce{
    0%,100%{transform:translateY(0);}
    50%{transform:translateY(-10px);}
}

/* BOTÃO MÚSICA */
.music-btn{
    position:fixed;
    bottom:20px;
    right:20px;
    padding:12px 16px;
    font-size:0.9em;
    border:none;
    border-radius:50px;
    background:#ff1744;
    color:#fff;
    cursor:pointer;
    z-index:20;
}

/* MOBILE AJUSTE */
@media(max-width:600px){
    h1{font-size:2.5em;}
    .music-btn{
        padding:10px 14px;
        font-size:0.8em;
        bottom:15px;
        right:15px;
    }
}

/* CORAÇÕES */
.falling-hearts{
    position:fixed;
    width:100%;
    height:100%;
    pointer-events:none;
}

.heart-fall{
    position:absolute;
    font-size:1.8em;
    animation:fall 6s linear;
}

@keyframes fall{
    0%{transform:translateY(-100px);}
    100%{transform:translateY(100vh);}
}
</style>

</head>

<body>

<div class="background" id="bg"></div>
<div class="overlay"></div>

<div class="falling-hearts" id="fallingHearts"></div>

<div class="container">
    <h1>❤️</h1>
</div>

<button class="music-btn" onclick="toggleMusic()">🎵</button>

<audio id="music" loop>
    <source src="midia/musica.mp3" type="audio/mpeg">
</audio>

<script>
let index=0;

const fotos=[
    "midia/foto1.jpg",
    "midia/foto2.jpg",
    "midia/foto3.jpg",
    "midia/foto4.jpg"
];

/* CARROSSEL */
function trocarFundo(){
    document.getElementById("bg").style.backgroundImage =
        `url('${fotos[index]}')`;
    index=(index+1)%fotos.length;
}

setInterval(trocarFundo,3000);
trocarFundo();

/* MÚSICA */
function toggleMusic(){
    const m=document.getElementById("music");
    if(m.paused){m.play();}else{m.pause();}
}

/* CORAÇÕES AUTOMÁTICOS */
function createHeart(){
    const heart=document.createElement("div");
    heart.className="heart-fall";
    heart.textContent="❤️";
    heart.style.left=Math.random()*window.innerWidth+"px";
    document.getElementById("fallingHearts").appendChild(heart);
    setTimeout(()=>heart.remove(),6000);
}

setInterval(()=>{
    if(Math.random()>0.6)createHeart();
},500);
</script>

</body>
</html>
